<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&amp;display=swap');
    .wm { font-family: Georgia, serif; fill: #F5F2F6; font-weight: 600; letter-spacing: -0.5px; }
    .wa { fill: #FF7AD9; }
    .tl { font-family: 'JetBrains Mono', monospace; fill: #92909C; letter-spacing: 3px; }
  </style>

  <!-- Icon area 100x100 -->
  <g transform="translate(50,50)">
    <!-- Shield -->
    <path d="M0,-36 C0,-36 25,-28 27,-16 C29,-4 25,12 17,23 C10,31 5,36 0,39 C-5,36 -10,31 -17,23 C-25,12 -29,-4 -27,-16 C-25,-28 0,-36 0,-36Z"
          fill="#141418" stroke="#FF7AD9" stroke-width="1.2"/>

    <!-- Hex -->
    <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5"
             fill="#FF7AD9" opacity="0.12"/>
    <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5"
             fill="none" stroke="#FF7AD9" stroke-width="1"/>

    <!-- Hash -->
    <line x1="-4" y1="-9" x2="-4" y2="9" stroke="#FF7AD9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-9" x2="4" y2="9" stroke="#FF7AD9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-9" y1="-3" x2="9" y2="-3" stroke="#FF7AD9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-9" y1="3" x2="9" y2="3" stroke="#FF7AD9" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Vertex dots -->
    <circle cx="0" cy="-15" r="1.5" fill="#FF7AD9"/>
    <circle cx="13" cy="-7.5" r="1.5" fill="#FF7AD9"/>
    <circle cx="13" cy="7.5" r="1.5" fill="#FF7AD9"/>
    <circle cx="0" cy="15" r="1.5" fill="#FF7AD9"/>
    <circle cx="-13" cy="7.5" r="1.5" fill="#FF7AD9"/>
    <circle cx="-13" cy="-7.5" r="1.5" fill="#FF7AD9"/>

    <!-- Chain nodes small -->
    <circle cx="0" cy="-30" r="4" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1.2"/>
    <circle cx="0" cy="-30" r="1.5" fill="#FF7AD9"/>
    <circle cx="24" cy="-14" r="3.5" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1"/>
    <circle cx="24" cy="-14" r="1.2" fill="#FF7AD9"/>
    <circle cx="24" cy="14" r="3.5" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1"/>
    <circle cx="24" cy="14" r="1.2" fill="#FF7AD9"/>
    <circle cx="0" cy="30" r="4" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1.2"/>
    <circle cx="0" cy="30" r="1.5" fill="#FF7AD9"/>
    <circle cx="-24" cy="14" r="3.5" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1"/>
    <circle cx="-24" cy="14" r="1.2" fill="#FF7AD9"/>
    <circle cx="-24" cy="-14" r="3.5" fill="#1A1A22" stroke="#FF7AD9" stroke-width="1"/>
    <circle cx="-24" cy="-14" r="1.2" fill="#FF7AD9"/>

    <!-- Connectors -->
    <line x1="0" y1="-18" x2="0" y2="-26" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
    <line x1="13" y1="-7.5" x2="21" y2="-11" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
    <line x1="13" y1="7.5" x2="21" y2="11" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
    <line x1="0" y1="18" x2="0" y2="26" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
    <line x1="-13" y1="7.5" x2="-21" y2="11" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
    <line x1="-13" y1="-7.5" x2="-21" y2="-11" stroke="#FF7AD9" stroke-width="0.8" stroke-dasharray="3 2.5" opacity="0.5"/>
  </g>

  <!-- Separator -->
  <line x1="96" y1="24" x2="96" y2="76" stroke="#FF7AD9" stroke-width="0.8" opacity="0.3"/>

  <!-- Wordmark -->
  <text class="wm" x="112" y="58" font-size="32">Shelby <tspan class="wa">PoD</tspan></text>

  <!-- Tagline -->
  <text class="tl" x="114" y="76" font-size="10">PROOF · OF · DATA</text>
</svg>
